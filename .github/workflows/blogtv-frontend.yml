name: Deploy blogtv-frontend

on:
  push:
    branches: [ main ]
    paths:
      - 'blogtv/**'
      - 'k8s/**'
      - '.github/workflows/blogtv-frontend.yml'
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    env:
      IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/blogtv

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v4
        with:
          context: ./blogtv
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ env.IMAGE_NAME }}:latest
          build-args: |
            VITE_GEMINI_API_KEY=${{ secrets.VITE_GEMINI_API_KEY }}

      - name: Export IMAGE_TAG
        run: echo "IMAGE_TAG=${{ env.IMAGE_NAME }}:${{ github.sha }}" >> $GITHUB_ENV

      - name: Set Up KUBECONFIG
        run: |
          # Write the secret to a file (preserve newlines). We'll normalize below.
          printf '%s' "${{ secrets.KUBECONFIG_FILE_CONTENT }}" > kubeconfig.yaml
          echo "KUBECONFIG=$PWD/kubeconfig.yaml" >> $GITHUB_ENV

      - name: Kubeconfig preview
        run: |
          echo "kubeconfig (first 20 lines):"
          head -n 20 kubeconfig.yaml || true
          echo "Cluster server (if readable):"
          kubectl --kubeconfig=kubeconfig.yaml config view --raw -o jsonpath="{.clusters[0].cluster.server}" 2>/dev/null || true

      - name: Kubeconfig sanity check
        run: |
          if [ ! -s kubeconfig.yaml ]; then echo "kubeconfig missing or empty" >&2; exit 1; fi
          SERVER=$(kubectl --kubeconfig=kubeconfig.yaml config view --raw -o jsonpath="{.clusters[0].cluster.server}" 2>/dev/null || true)
          echo "Cluster server: $SERVER"
          if [ -z "$SERVER" ]; then echo "unable to read server from kubeconfig" >&2; exit 1; fi
          if [[ "$SERVER" == *localhost* ]]; then echo "kubeconfig points to localhost; runner cannot reach localhost:8080" >&2; exit 1; fi

      - name: Deploy to Kubernetes
        run: |
          echo "Deploying image: ${{ env.IMAGE_TAG }}"
          sed "s|ghcr.io/ekskog/blogtv:latest|${{ env.IMAGE_TAG }}|g" blogtv/k8s/deployment.yaml | kubectl apply -f -
          kubectl rollout status deployment/blogt-frontend --namespace=blogt --timeout=600s
