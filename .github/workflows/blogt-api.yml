name: Deploy blogt-api

on:
  push:
    branches: [ main ]
    paths:
      - 'blogt-api/**'
      - 'k8s/**'
      - '.github/workflows/blogt-api.yml'
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    env:
      IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/blogt-api

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ secrets.CR_PAT_USERNAME || github.actor }}
          password: ${{ secrets.CR_PAT }}

      - name: Build and push image
        uses: docker/build-push-action@v4
        with:
          context: ./blogt-api
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ env.IMAGE_NAME }}:latest

      - name: Export IMAGE_TAG
        run: echo "IMAGE_TAG=${{ env.IMAGE_NAME }}:${{ github.sha }}" >> $GITHUB_ENV

      - name: Set Up KUBECONFIG
        run: |
          # Write the secret to a file (preserve newlines). We'll normalize below.
          printf '%s' "${{ secrets.KUBECONFIG_FILE_CONTENT }}" > kubeconfig.yaml
          echo "KUBECONFIG=$PWD/kubeconfig.yaml" >> $GITHUB_ENV

      - name: Kubeconfig preview
        run: |
          echo "kubeconfig (first 20 lines):"
          head -n 20 kubeconfig.yaml || true
          echo "Cluster server (if readable):"
          kubectl --kubeconfig=kubeconfig.yaml config view --raw -o jsonpath="{.clusters[0].cluster.server}" 2>/dev/null || true

      - name: Kubeconfig sanity check
        run: |
          if [ ! -s kubeconfig.yaml ]; then echo "kubeconfig missing or empty" >&2; exit 1; fi
          SERVER=$(kubectl --kubeconfig=kubeconfig.yaml config view --raw -o jsonpath="{.clusters[0].cluster.server}" 2>/dev/null || true)
          echo "Cluster server: $SERVER"
          if [ -z "$SERVER" ]; then echo "unable to read server from kubeconfig" >&2; exit 1; fi
          if [[ "$SERVER" == *localhost* ]]; then echo "kubeconfig points to localhost; runner cannot reach localhost:8080" >&2; exit 1; fi

      - name: Deploy to Kubernetes
        run: |
          echo "Deploying image: ${{ env.IMAGE_TAG }}"
          sed "s|ghcr.io/xkogd66/blogt-api:latest|${{ env.IMAGE_TAG }}|g" blogt-api/k8s/deployment.yaml | kubectl apply -f -
          kubectl apply -f blogt-api/k8s/service.yaml
          kubectl apply -f blogt-api/k8s/auto-scaler.yaml
          kubectl rollout status deployment/blogt-api --namespace=blogt --timeout=600s

      - name: Debug on Failure
        if: failure()
        run: |
          echo "Deployment failed. Gathering debug information..."
          kubectl describe deployment blogt-api --namespace=blogt
          kubectl describe pods -l app=blogt-api --namespace=blogt
          kubectl logs -l app=blogt-api --namespace=blogt --tail=50
